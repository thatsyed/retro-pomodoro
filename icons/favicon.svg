<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#2c1e1c"/>
  <!-- console body -->
  <rect x="3" y="4" width="26" height="24" rx="3" fill="#ebd8b7" stroke="#4d312c" stroke-width="2.5"/>
  <!-- screen -->
  <rect x="7" y="8" width="18" height="13" fill="#3c2421"/>
  <!-- bold amber colon-timer glow, simplified for legibility at 16px -->
  <rect x="10" y="11" width="4" height="7" fill="#e5b060"/>
  <rect x="18" y="11" width="4" height="7" fill="#e5b060"/>
  <rect x="15.2" y="12.5" width="1.6" height="1.6" fill="#e5b060"/>
  <rect x="15.2" y="16" width="1.6" height="1.6" fill="#e5b060"/>
  <!-- single bold LED -->
  <circle cx="16" cy="24.5" r="2" fill="#c26f63" stroke="#4d312c" stroke-width="1"/>
</svg>
